[package]
name = "naming-srv"
version = "0.1.0"
edition = "2021"

# Important: this should be compiled as both an rlib, for exporting the trampoline,
# and as a cdylib, as the actual .so file that will be exporting the gates.
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
lazy_static = { workspace = true }
secgate = { workspace = true }
twizzler-runtime = { workspace = true }
twizzler-rt-abi = { path = "../../abi/rt-abi" }
twizzler-abi = { path = "../../lib/twizzler-abi" }
twizzler = { workspace = true }
arrayvec = { workspace = true }
naming-core = { workspace = true }
lazy-init = { workspace = true }
tracing = { workspace = true }
pager = { workspace = true }
tracing-subscriber = { workspace = true }

[features]
