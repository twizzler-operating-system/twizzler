[package]
name = "pager-srv"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
twizzler-abi = { path = "../../lib/twizzler-abi" }
twizzler-rt-abi = { path = "../../abi/rt-abi" }
twizzler-queue = { workspace = true }
twizzler-driver = { workspace = true }
twizzler-runtime = { workspace = true }
secgate = { workspace = true }
object-store = { workspace = true }
twizzler = { workspace = true }
nvme = { workspace = true }
devmgr = { workspace = true }
slab = { workspace = true, features = [] }
itertools = { workspace = true }
stable-vec = { workspace = true }
rand = "*"
heapless = { workspace = true }
async-channel = { workspace = true }
mayheap = { workspace = true }

async-trait = { workspace = true }
volatile = "0.6"
bitvec = { workspace = true }

tracing = { workspace = true }
tracing-subscriber = { workspace = true }
miette = { workspace = true }
tracing-log = { workspace = true }

async-io = { workspace = true }
async-executor = { workspace = true, features = [] }
twizzler-futures = { workspace = true }
polling = { workspace = true }
futures = { workspace = true }
colored = { workspace = true }
async-condvar-fair = { workspace = true }
async-lock = { workspace = true }
