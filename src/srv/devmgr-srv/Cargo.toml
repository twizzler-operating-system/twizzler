[package]
name = "devmgr-srv"
version = "0.1.0"
edition = "2021"


# Important: this should be compiled as both an rlib, for exporting the trampoline,
# and as a cdylib, as the actual .so file that will be exporting the gates.
[lib]
crate-type = ["cdylib"]

[dependencies]
twizzler-driver = { workspace = true }
twizzler-abi = { path = "../../lib/twizzler-abi" }
twizzler-runtime = { workspace = true }
pci_types = { workspace = true }
async-trait = { workspace = true }
volatile = { workspace = true }
secgate = { workspace = true }
twizzler-rt-abi = "0.99"
tracing-subscriber = { workspace = true }
tracing = { workspace = true }
devmgr = { workspace = true }
twizzler = { workspace = true }
