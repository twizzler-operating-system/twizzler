[package]
name = "wasmtime-internal-fiber"
version = "38.0.0"
description = "INTERNAL: Fiber support for Wasmtime (patched for Twizzler)"
license = "Apache-2.0 WITH LLVM-exception"
edition = "2021"

[dependencies]
anyhow = { version = "1.0.93", default-features = false }
cfg-if = "1.0"
wasmtime-versioned-export-macros = { git = "https://github.com/bytecodealliance/wasmtime.git", rev = "192f2fc", package = "wasmtime-internal-versioned-export-macros" }
wasmtime-asm-macros = { git = "https://github.com/bytecodealliance/wasmtime.git", rev = "192f2fc", package = "wasmtime-internal-asm-macros" }

[target.'cfg(unix)'.dependencies]
rustix = { version = "1.0.3", features = ["mm"] }
libc = { version = "0.2.112", default-features = true }

[target.'cfg(windows)'.dependencies.windows-sys]
version = "0.60.2"
features = [
  "Win32_System_Threading",
  "Win32_Foundation",
]

[build-dependencies]
cc = "1.0"
wasmtime-versioned-export-macros = { git = "https://github.com/bytecodealliance/wasmtime.git", rev = "192f2fc", package = "wasmtime-internal-versioned-export-macros" }

[features]
std = []
