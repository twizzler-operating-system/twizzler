[install]
prefix = "../../install"
sysconfdir = "etc"

[llvm]
download-ci-llvm = false
targets = "AArch64;X86"
experimental-targets = ""
ninja = true
clang = true
optimize = true
assertions = true

[build]
target = []
host = []
submodules = false
docs = false
sanitizers = true
build-dir = "../../build/rust"

[rust]
lld = false
llvm-tools = true
debug = true
debuginfo-level = 1
dist-src = false

[dist]
src-tarball = false
